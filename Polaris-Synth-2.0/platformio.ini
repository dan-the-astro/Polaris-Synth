; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM3
lib_deps = 
	felis/USB-Host-Shield-20@^1.6.0
	olikraus/U8g2@^2.36.5
	adafruit/Adafruit MCP23017 Arduino Library@^2.3.2
	adafruit/Adafruit ADS1X15@^2.5.0

; Re-applies the UHS2 GPIO17->GPIO2 INT patch before each build (see patch_uhs2.py)
extra_scripts = pre:patch_uhs2.py

build_unflags = -std=gnu++11
build_flags =
	-std=gnu++2a
	-D FIRMWARE_VERSION='"2.0.0"'
	; Temporary SD diagnostics: surfaces the SD library's per-command warnings
	; (GO_IDLE_STATE / SEND_IF_COND / Select etc.). Lower back to 1 once the
	; card mounts reliably.
	-D CORE_DEBUG_LEVEL=4

monitor_filters = esp32_exception_decoder

build_type = debug
